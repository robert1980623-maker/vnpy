# vnpy 量化交易系统配置文件
# ================================
# 所有配置项集中管理，无需修改代码即可调整参数

# ================================
# 数据配置
# ================================
data:
  # 数据源：akshare | baostock | rqdata
  source: akshare
  
  # 数据保存目录（相对于 examples/alpha_research）
  directory: ./data/akshare/bars
  
  # 最大并行下载线程数
  max_workers: 4
  
  # 单次下载最大股票数量
  max_stocks: 20
  
  # 是否强制重新下载（覆盖已有数据）
  force_download: false
  
  # 数据质量检查
  quality_check:
    enabled: true
    min_days: 60          # 最少交易日
    max_missing_rate: 0.05  # 最大缺失率 5%

# ================================
# 交易配置
# ================================
trading:
  # 初始资金
  initial_capital: 1000000
  
  # 手续费率（万分之三）
  commission_rate: 0.0003
  
  # 滑点（1%）
  slippage: 0.01
  
  # 每只股票默认买入数量
  default_volume: 1000
  
  # 单只股票最大仓位（占总资金比例）
  max_position_pct: 0.2
  
  # 最小交易间隔（秒）
  min_trade_interval: 1
  
  # 交易成本计算
  cost_calculation:
    include_commission: true
    include_slippage: true
    include_tax: true      # 印花税（卖出时收取）
    tax_rate: 0.001        # 印花税千分之一

# ================================
# 策略配置
# ================================
strategy:
  # 默认选股策略：value | growth | momentum | quality | industry
  default_strategy: value
  
  # 默认股票池
  default_pool: hs300      # hs300 | zz500 | custom
  
  # 最大选股数量
  max_stocks: 10
  
  # 最小选股数量
  min_stocks: 5
  
  # 策略参数
  parameters:
    # 价值股策略
    value:
      max_pe: 20          # 最大市盈率
      max_pb: 3           # 最大市净率
      min_roe: 0.10       # 最小 ROE 10%
    
    # 成长股策略
    growth:
      min_revenue_growth: 0.20   # 最小营收增长 20%
      min_profit_growth: 0.25    # 最小净利润增长 25%
      min_roe: 0.15              # 最小 ROE 15%
    
    # 动量策略
    momentum:
      lookback_days: 20          # 回看天数
      min_momentum: 0.05         # 最小动量 5%
    
    # 质量因子策略
    quality:
      min_roe: 0.15
      min_profit_margin: 0.20    # 最小净利率 20%
      max_debt_ratio: 0.50       # 最大负债率 50%
    
    # 行业轮动策略
    industry:
      top_industries: 3          # 选择前 3 个行业
      stocks_per_industry: 2     # 每个行业选 2 只

# ================================
# 回测配置
# ================================
backtest:
  # 默认回测区间
  start_date: "20250101"
  end_date: "20260301"
  
  # 回测模式：daily | minute
  mode: daily
  
  # 基准指数
  benchmark: 000300.SH     # 沪深 300
  
  # 再平衡周期（天）
  rebalance_days: 5
  
  # 绩效指标
  metrics:
    - total_return
    - annual_return
    - sharpe_ratio
    - max_drawdown
    - win_rate
    - profit_loss_ratio
  
  # 可视化
  visualization:
    enabled: true
    save_path: ./backtest_result.html
    show_trades: true

# ================================
# 日志配置
# ================================
logging:
  # 日志级别：DEBUG | INFO | WARNING | ERROR
  level: INFO
  
  # 日志目录
  directory: ./logs
  
  # 日志文件名格式
  filename_format: quant_trading_%Y%m%d.log
  
  # 日志格式
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  
  # 输出方式
  output:
    console: true          # 控制台输出
    file: true            # 文件输出
    rotate: false         # 是否轮转（大文件分割）
    max_size_mb: 100      # 单个文件最大 MB

# ================================
# 股票池配置
# ================================
stock_pool:
  # 沪深 300 成分股
  hs300:
    index_code: 000300.SH
    auto_update: true
    update_frequency: monthly
  
  # 中证 500 成分股
  zz500:
    index_code: 000905.SH
    auto_update: true
    update_frequency: monthly
  
  # 自定义股票池
  custom:
    stocks:
      - 000001.SZ
      - 000002.SZ
      - 000063.SZ
      - 000858.SZ
      - 002230.SZ
      - 002415.SZ
      - 002594.SZ
      - 300059.SZ
      - 300750.SZ
      - 600000.SH
      - 600016.SH
      - 600036.SH
      - 600519.SH
      - 600570.SH
      - 600690.SH
      - 601012.SH
      - 601166.SH
      - 601288.SH

# ================================
# 缓存配置
# ================================
cache:
  # 是否启用缓存
  enabled: true
  
  # 缓存目录
  directory: ./cache
  
  # 缓存有效期（小时）
  ttl_hours: 24
  
  # 缓存类型：memory | disk
  type: disk
  
  # 最大缓存大小（MB）
  max_size_mb: 500

# ================================
# 通知配置（可选）
# ================================
notification:
  # 是否启用通知
  enabled: false
  
  # 通知方式：email | wechat | dingtalk
  methods: []
  
  # 通知事件
  events:
    - trade_executed      # 交易执行
    - daily_summary       # 每日总结
    - error_alert         # 错误告警
  
  # 邮件配置（示例）
  email:
    smtp_server: smtp.example.com
    smtp_port: 587
    sender: your_email@example.com
    recipients:
      - recipient1@example.com
      - recipient2@example.com

# ================================
# 高级配置（一般无需修改）
# ================================
advanced:
  # Python 路径
  python_path: python3
  
  # 工作目录（相对于 examples/alpha_research）
  working_directory: ./
  
  # Lab 工作目录
  lab_directory: ./lab/test
  
  # 临时目录
  temp_directory: ./tmp
  
  # 最大重试次数
  max_retries: 3
  
  # 重试间隔（秒）
  retry_interval: 2
  
  # 超时设置（秒）
  timeout:
    download: 300        # 下载超时 5 分钟
    backtest: 600        # 回测超时 10 分钟
    trading: 60          # 交易超时 1 分钟

# ================================
# 环境特定配置（可选）
# ================================
# 开发环境
development:
  logging:
    level: DEBUG
  data:
    max_stocks: 5

# 生产环境
production:
  logging:
    level: WARNING
  trading:
    initial_capital: 10000000
  notification:
    enabled: true

# 测试环境
testing:
  data:
    source: mock
  trading:
    initial_capital: 100000
